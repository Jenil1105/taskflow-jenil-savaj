services:
  postgres:
    image: postgres:15
    container_name: taskflow_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: taskflow_backend
    restart: on-failure
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./backend/seeds:/seeds   
    command: >
      sh -c "npx node-pg-migrate up &&
      sleep 3 &&
      psql $DATABASE_URL -f /seeds/seed.sql &&
      npm start"